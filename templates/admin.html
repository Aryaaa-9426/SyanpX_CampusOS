<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - CampusOS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Admin Panel</h1>

<h3>Add Event</h3>

<form method="POST" action="/admin">

    <input type="hidden" name="type" value="event">

    <input type="text" name="title" placeholder="Event Title" required>

    <input type="text" name="date" placeholder="Event Date" required>

    <input type="text" name="description" placeholder="Description" required>

    <button type="submit">Add Event</button>

</form>


<hr>


<h3>Add Notice</h3>

<form method="POST" action="/admin">

    <input type="hidden" name="type" value="notice">

    <input type="text" name="title" placeholder="Notice Title" required>

    <textarea name="message" placeholder="Notice Message" required></textarea>

    <button type="submit">Add Notice</button>

</form>
<hr>

<h3>Add Study Material</h3>

<form method="POST" action="/add_material">

    <input type="text" name="subject" placeholder="Subject" required>

    <input type="text" name="title" placeholder="Material Title" required>

    <input type="text" name="link" placeholder="Google Drive / PDF Link" required>

    <button type="submit">Add Material</button>

</form>
<hr>

<h3>Add Academic Calendar</h3>

<form method="POST" action="/add_calendar">

    <input type="text" name="title" placeholder="Title" required>

    <input type="text" name="date" placeholder="Date" required>

    <input type="text" name="description" placeholder="Description" required>

    <button type="submit">Add Calendar</button>

</form>
<a href="/events"><button>View Events</button></a>

<a href="/notices"><button>View Notices</button></a>

<a href="/study_materials"><button>Study Materials</button></a>

<a href="/admin_feedback"><button>View Feedback</button></a>

<a href="/calendar"><button>View Academic Calendar</button></a>


</div>

</body>
</html>
