<!DOCTYPE html>
<html>
<head>
    <title>Campus Events</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Campus Events</h1>

{% for event in events %}

<div class="card">

    <h3>{{ event.title }}</h3>

    <p>Date: {{ event.date }}</p>

    <p>{{ event.description }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
