<!DOCTYPE html>
<html>
<head>
    <title>Campus Notices</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>Campus Notices</h1>

<div class="card">

    <p>{{ notice.message }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
