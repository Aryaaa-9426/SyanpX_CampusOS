<!DOCTYPE html>
<html>
<head>
    <title>Academic Calendar - CampusOS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Academic Calendar</h1>

    {% for calendar in calendars %}

    <div class="card">

        <h3>{{ calendar.title }}</h3>

        <p><b>Date:</b> {{ calendar.date }}</p>

        <p>{{ calendar.description }}</p>

    </div>

    {% endfor %}

</div>

</body>
</html>
